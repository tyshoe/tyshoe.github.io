  :root {
    --tan: #9a8866;
    --tan-dim: #6f6249;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: radial-gradient(120% 120% at 50% 40%, #101010 0%, #000 70%);
    color: var(--tan);
    font-family: "Bender", "Segoe UI", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100%;
    gap: clamp(1.5rem, 5vh, 3.5rem);
    padding: 6vh 4vw;
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }

  .heading {
    color: var(--tan-dim);
    text-transform: uppercase;
    letter-spacing: 0.42em;
    font-size: clamp(0.7rem, 2.2vw, 1rem);
    padding-left: 0.42em; /* balance the trailing letter-spacing */
    max-width: 100%; /* wrap instead of overflowing on narrow screens */
  }

  .clock {
    display: flex;
    align-items: stretch;
    gap: clamp(1.25rem, 4vw, 3rem);
    max-width: 100%;
  }

  .time {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    align-items: center;
  }

  .time .value {
    display: flex;
    justify-content: center;
    font-size: clamp(2.4rem, 11vw, 6.25rem);
    line-height: 1;
    text-shadow: 0 0 22px rgba(154, 136, 102, 0.18);
  }

  /* Bender has no tabular-figure feature, so we enforce the monospace grid
     ourselves: every glyph gets a fixed slot, so digits never nudge the
     layout as they tick. */
  .time .value .cell {
    display: inline-block;
    text-align: center;
  }
  .time .value .digit { width: 0.66em; }
  .time .value .colon { width: 0.30em; }

  .time .label {
    color: var(--tan-dim);
    text-transform: uppercase;
    letter-spacing: 0.35em;
    font-size: clamp(0.6rem, 1.8vw, 0.85rem);
    padding-left: 0.35em;
  }

  .divider {
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--tan-dim), transparent);
    align-self: stretch;
  }

  /* Narrow screens (e.g. a phone as a second display): stack the two times
     so they never overflow, and turn the divider horizontal. */
  @media (max-width: 560px) {
    .clock { flex-direction: column; gap: clamp(1rem, 4vh, 2rem); }
    .divider {
      width: 55%;
      height: 1px;
      align-self: center;
      background: linear-gradient(to right, transparent, var(--tan-dim), transparent);
    }
    .heading { letter-spacing: 0.22em; padding-left: 0.22em; }
  }
</style>

<div class="heading">Escape&nbsp;from&nbsp;Tarkov &middot; Raid&nbsp;Time</div>

<div class="clock">
  <div class="time">
    <div class="value" id="left">--:--:--</div>
    <div class="label">Left</div>
  </div>
  <div class="divider"></div>
  <div class="time">
    <div class="value" id="right">--:--:--</div>
    <div class="label">Right</div>
  </div>
</div>

<script>
  // In-raid time is a pure function of real UTC time — identical for every
  // player, everywhere. It never uses the local timezone: 1 real second = 7
  // Tarkov seconds, the world clock is Moscow (UTC+3), and the two schedules
  // run 12 hours apart. (The only assumption is that the device clock is set
  // correctly, since Date.now() reads from it.)
  var TARKOV_RATIO = 7;
  var ONE_DAY = 24 * 60 * 60 * 1000;
  var HALF_DAY = 12 * 60 * 60 * 1000;
  var RUSSIA_OFFSET = 3 * 60 * 60 * 1000; // UTC+3
  var EXTRA_OFFSET = 2500; // ms fine-tune carried over from the desktop app

  function pad(n) { return String(n).padStart(2, "0"); }

  // addHalfDay: the second schedule runs 12 hours ahead of the first.
  function tarkovTime(addHalfDay) {
    var now = Date.now(); // epoch ms — an absolute instant, the same for everyone
    var ms = (RUSSIA_OFFSET + (addHalfDay ? HALF_DAY : 0) + now * TARKOV_RATIO) % ONE_DAY - EXTRA_OFFSET;
    if (ms < 0) ms += ONE_DAY;
    var d = new Date(ms); // read as UTC so the viewer's timezone never shifts the result
    return pad(d.getUTCHours()) + ":" + pad(d.getUTCMinutes()) + ":" + pad(d.getUTCSeconds());
  }

  // Build fixed-width character cells once, then only swap the digit text, so
  // the colons and digit slots hold their positions and nothing jumps.
  function buildCells(el) {
    el.textContent = "";
    return "00:00:00".split("").map(function (ch) {
      var span = document.createElement("span");
      span.className = "cell " + (ch === ":" ? "colon" : "digit");
      span.textContent = ch;
      el.appendChild(span);
      return span;
    });
  }

  function render(cells, str) {
    for (var i = 0; i < str.length; i++) {
      if (cells[i].textContent !== str[i]) cells[i].textContent = str[i];
    }
  }

  var leftCells = buildCells(document.getElementById("left"));
  var rightCells = buildCells(document.getElementById("right"));

  function tick() {
    render(leftCells, tarkovTime(false)); // first schedule
    render(rightCells, tarkovTime(true));  // +12h
  }

  tick();
  setInterval(tick, 100);
</script>
